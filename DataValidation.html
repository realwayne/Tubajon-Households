<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Viewer with Username Auth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #login-form {
            max-width: 300px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        #login-form input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        #login-form button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        #login-form button:hover {
            background-color: #0056b3;
        }

        #content {
            display: none;
        }

        #logout-btn {
            margin-bottom: 20px;
            padding: 5px 10px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div id="login-form">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        <button onclick="login()">Login</button>
        <div id="login-error" class="error"></div>
    </div>

    <div id="content">
        <button id="logout-btn" onclick="logout()">Logout</button>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>For Data Validation of: <span id="current-user"></span></h2>
            <button id="download-btn" style="background-color: #007bff; color: white" type="button">Download</button>
        </div>
        <div id="csv-table" style="overflow-x: scroll;"></div>
    </div>

    <script>
        // Parse CSV string to array of objects
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');

            // remove carriage return
            const headers = lines[0].replace(/\r/g, '').split(',');

            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].replace(/\r/g, '').split(',');
                const row = {};

                headers.forEach((header, index) => {
                    row[header.trim()] = values[index]?.trim() || '';
                });

                data.push(row);
            }

            return { headers, data };
        }
        // Check if user is logged in
        function checkAuth() {
            const username = sessionStorage.getItem('username');
            if (username) {
                showContent(username);
            }
        }

        // Login function
        function login() {
            const username = document.getElementById('username').value.trim();
            const errorDiv = document.getElementById('login-error');

            if (username === '') {
                errorDiv.textContent = 'Please enter a username';
                return;
            }

            const barangayUsernames = [
                "diaz",
                "imelda",
                "mabini",
                "malinao",
                "navarro",
                "roxas",
                "san roque",
                "san vicente",
                "santa cruz"
            ];


            // if username is not in the list of barangay usernames, show error
            if (!barangayUsernames.includes(username)) {
                errorDiv.textContent = 'Invalid username. Please enter a valid barangay username.';
                return;
            }

            // Store username in sessionStorage (cleared when browser is closed)
            sessionStorage.setItem('username', username);

            // Clear login form and show content
            document.getElementById('username').value = '';
            errorDiv.textContent = '';

            showContent(username);
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem('username');
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('content').style.display = 'none';
        }

        // Show content filtered by username
        function showContent(username) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('current-user').textContent = username.toString().toUpperCase();

            // Parse CSV
            const { headers, data } = parseCSV(window.csvData);

            // Filter data for the username (case-insensitive)
            const filteredData = data.filter(row => {
                // Assuming the username column is "Barangay" - adjust this based on your CSV structure
                return row['Barangay'] && row['Barangay'].toLowerCase() === username.toLowerCase();
            });

            // Display filtered data
            displayTable(headers, filteredData);
        }

        // Display data in table format
        function displayTable(headers, data) {
            const tableDiv = document.getElementById('csv-table');

            if (data.length === 0) {
                tableDiv.innerHTML = '<p>No data found for this user</p>';
                return;
            }

            let html = '<table><thead><tr>';

            // Create header row
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Create data rows
            data.forEach(row => {
                html += '<tr>';
                headers.forEach(header => {
                    if (header == "Building QR") {
                        html += `
                            <td>
                                <img src="https://pditub.chis.com.ph/System/image/qrcode?PARAM_SIZE=10&PARAM_QRCODE=${row["Building Code"]}" alt="QR Code" style="width: 40px; height: 40px; object-fit: contain;">
                            </td>`;
                    } else {
                        html += `<td>${row[header]}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            tableDiv.innerHTML = html;
            // store the currently displayed table so it can be downloaded
            window.currentTable = { headers: headers.slice(), data: data.slice() };
        }

        // Load CSV from file (if you want to load from external file)
        async function loadCSVFromFile() {
            try {
                const response = await fetch('./validation.csv'); // Replace with your CSV file path
                const csvText = await response.text();

                // Store CSV data globally or process it
                window.csvData = csvText;

                console.log(csvText)
            } catch (error) {
                console.error('Error loading CSV:', error);
                window.csvData = sampleCSV;
            }
        }

        // Initialize
        window.onload = async function () {
            document.getElementById('username').focus();
            document.getElementById('username')
                .addEventListener('keyup', function (e) {
                    if (e.key === 'Enter') {
                        login();
                    }
                });

            await loadCSVFromFile();

            checkAuth();

            // Wire download button to export current table as CSV
            const downloadBtn = document.getElementById('download-btn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', function () {
                    const tbl = window.currentTable;
                    if (!tbl || !tbl.data || tbl.data.length === 0) {
                        alert('No table data available to download.');
                        return;
                    }

                    function escapeCsvValue(val) {
                        if (val === null || val === undefined) return '';
                        const s = String(val);
                        if (/[",\n\r]/.test(s)) {
                            return '"' + s.replace(/"/g, '""') + '"';
                        }
                        return s;
                    }

                    const rows = [];
                    rows.push(tbl.headers.map(h => escapeCsvValue(h)).join(','));
                    tbl.data.forEach(r => {
                        const vals = tbl.headers.map(h => escapeCsvValue(r[h] ?? ''));
                        rows.push(vals.join(','));
                    });

                    const csvContent = rows.join('\r\n');
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const user = document.getElementById('current-user')?.textContent;
                    a.download = `validation_${user}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                });
            }
        };
    </script>
</body>

</html>
